const rowKey=(scope,i)=>`${scope}-${i}`;
const rowTotal=(st,scope,i)=>((st.rows||{})[rowKey(scope,i)]||[]).reduce((s,v)=>s+(parseFloat(v)||0),0);
const rowCO2=(st,scope,rows,i)=>rowTotal(st,scope,i)*rows[i].ef/1000;
const scopeCO2=(st,scope,rows)=>rows.reduce((s,_,i)=>s+rowCO2(st,scope,rows,i),0);
const divTotals=(st,div)=>({s1:scopeCO2(st,"S1",div.s1),s2:scopeCO2(st,"S2",div.s2),s3:scopeCO2(st,"S3",div.s3)});

  const out=[];[["S1",div.s1],["S2",div.s2],["S3",div.s3]].forEach(([sc,rows])=>rows.forEach((r,i)=>{
    if(r.req && rowTotal(st,sc,i)===0) out.push(`${sc==="S1"?"Scope 1":sc==="S2"?"Scope 2":"Scope 3"}: ${r.a}`);
  }));
  if(!st.fte) out.push("Workforce: Total FTE (average) missing");
  if(!st.prod) out.push(`Operational metric: ${div.prod} (${div.pu}) missing`);
  return out;
};

const ScopeTable=({scope,label,rows,st,setSt,color})=>{
  if(!rows.length) return null;
  const upd=(ri,mi,v)=>{const d={...st,rows:{...(st.rows||{})}};const k=rowKey(scope,ri);
    d.rows[k]=[...(d.rows[k]||Array(12).fill(""))];d.rows[k][mi]=v;setSt(d);};
  const updTier=(ri,v)=>{setSt({...st,tiers:{...(st.tiers||{}),[rowKey(scope,ri)]:v}});};
  const total=scopeCO2(st,scope,rows);
  return(
    <div style={{background:"#fff",borderRadius:13,padding:16,marginBottom:16,boxShadow:"0 4px 14px rgba(0,0,0,.06)",borderLeft:`5px solid ${color}`}}>

            <th style={{padding:5,minWidth:120}}>Data Quality</th>
          </tr></thead>
          <tbody>{rows.map((r,ri)=>{const tier=(st.tiers||{})[rowKey(scope,ri)]||"";const tc=tier?TIER_C[tier.slice(0,2)]:"#fff";
            return(<tr key={ri} style={{borderBottom:"1px solid #f2f2f2"}}>
              <td style={{padding:"5px 8px",fontWeight:600,position:"sticky",left:0,background:"#fff",whiteSpace:"nowrap",zIndex:1}}>

          <h1 style={{color:DARK,fontSize:24,fontWeight:900,margin:"14px 0 5px"}}>GHG EMISSIONS — 2025 BASELINE EXECUTIVE SUMMARY</h1>
          <div style={{color:"#888",fontSize:11.5}}>GHG Protocol Corporate Standard · Operational Control · IPCC AR6 GWP-100 · Base Year 2025 (Locked Reference)</div>
        </div>
        <div style={{background:`linear-gradient(120deg,${RED},${DARKRED})`,borderRadius:16,padding:"22px 20px",color:"#fff",display:"flex",justifyContent:"space-around",flexWrap:"wrap",gap:16,marginBottom:20,textAlign:"center"}}>
          {[[fmt(gTot),"Total Group t CO2e — 2025"],[fmt(BASELINE_GROUP.s1),`Scope 1 — ${gTot?(BASELINE_GROUP.s1/gTot*100).toFixed(1):0}%`],[fmt(BASELINE_GROUP.s2),`Scope 2 — ${gTot?(BASELINE_GROUP.s2/gTot*100).toFixed(1):0}%`],[BASELINE_GROUP.fte?fmt(gTot/BASELINE_GROUP.fte):"—","t CO2e / FTE"]].map(([v,l],i)=>(
            <div key={i}><div style={{fontSize:23,fontWeight:900}}>{v}</div><div style={{fontSize:10.5,opacity:.88}}>{l}</div></div>))}
        </div>
        <div style={{border:"1.5px solid #f0f0f0",borderRadius:14,overflow:"hidden",marginBottom:10}}>
          <div style={{background:GREY,padding:"11px 16px",fontWeight:900,fontSize:13}}>ALL ENTITIES — 2025 BASELINE RANKING</div>
          <ResponsiveContainer width="100%" height={240}><BarChart data={rows.filter(r=>r.total>0).map(r=>({name:r.name.split("(")[0].trim().slice(0,16),S1:+r.s1.toFixed(1),S2:+r.s2.toFixed(1)}))}>
            <CartesianGrid strokeDasharray="3 3" stroke="#eee"/><XAxis dataKey="name" tick={{fontSize:9}}/><YAxis tick={{fontSize:9}}/><Tooltip/>
            <Bar dataKey="S1" stackId="a" fill={RED} name="Scope 1"/><Bar dataKey="S2" stackId="a" fill={ORG} name="Scope 2" radius={[6,6,0,0]}/><Legend wrapperStyle={{fontSize:10}}/></BarChart></ResponsiveContainer>
        </div>
        {/* Entity cards — expandable division detail */}
        {rows.map((r,i)=>{const [lbl,c]=score(r.total);
          return(
          <div key={r.id} style={{border:"1.5px solid #f0f0f0",borderRadius:13,marginBottom:11,overflow:"hidden"}}>
            <div onClick={()=>setOpen(open===r.id?null:r.id)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 16px",cursor:"pointer",background:open===r.id?"#fff5f6":"#fafafa",flexWrap:"wrap",gap:8}}>
              <div style={{display:"flex",alignItems:"center",gap:11}}>
                <Logo id={r.id} h={30}/>
                <div><div style={{fontWeight:900,fontSize:13.5}}>#{i+1} {r.name}</div>
                <div style={{fontSize:10,color:"#999"}}>S1 {fmt(r.s1)} · S2 {fmt(r.s2)} · FTE {r.fte?fmt(r.fte):"—"} {r.fte?"· "+fmt(r.total/r.fte)+" t/FTE":""}</div></div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{background:c+"20",color:c,padding:"4px 12px",borderRadius:20,fontWeight:900,fontSize:10}}>{lbl}</span>
                <div style={{fontWeight:900,color:RED,fontSize:16}}>{fmt(r.total)} t</div>
                <span style={{color:"#bbb"}}>{open===r.id?"▲":"▼"}</span>
              </div>
            </div>
            {open===r.id && <div style={{padding:"14px 18px",borderTop:"1px solid #f2f2f2"}}>
              {r.divs.length===0 ? <div style={{fontSize:12,color:"#bbb"}}>No 2025 divisional data submitted yet for this entity.</div> :
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11.5}}>
                <thead><tr style={{background:"#fafafa"}}>{["Division","Emissions (S1+S2)","FTE","t CO2e / FTE","Production / Output","t CO2e / Unit"].map(h=>
                  <th key={h} style={{padding:"6px 10px",textAlign:"left",fontWeight:800,color:"#888",fontSize:10}}>{h}</th>)}</tr></thead>
                <tbody>{r.divs.map((d,di)=>{const dTot=d.s1+d.s2;return(
                  <tr key={di} style={{borderTop:"1px solid #f6f6f6"}}>
                    <td style={{padding:"7px 10px",fontWeight:700}}>{d.n}{d.note && <div style={{fontSize:9,color:"#aaa",fontWeight:400}}>{d.note}</div>}</td>
                    <td style={{padding:7,fontWeight:800,color:RED}}>{fmt(dTot)} t CO2e</td>
                    <td style={{padding:7}}>{d.fte?fmt(d.fte):"—"}</td>
                    <td style={{padding:7}}>{d.fte?fmt(dTot/d.fte):"—"}</td>
                    <td style={{padding:7}}>{d.prod?fmt(d.prod)+" "+d.pu:"—"}</td>
                    <td style={{padding:7}}>{d.prod?(dTot/d.prod).toFixed(6):"—"}</td>
                  </tr>);})}
                  <tr style={{borderTop:"2px solid #eee",fontWeight:900,background:"#fde8ec"}}>
                    <td style={{padding:8}}>ENTITY TOTAL</td><td style={{padding:8,color:RED}}>{fmt(r.total)} t CO2e</td>
                    <td style={{padding:8}}>{fmt(r.fte)}</td><td style={{padding:8}}>{r.fte?fmt(r.total/r.fte):"—"}</td><td colSpan={2}/>
                  </tr>
                </tbody></table>}
            </div>}
          </div>);
        })}
        <div style={{textAlign:"center",fontSize:10,color:"#aaa",borderTop:"1px solid #f0f0f0",paddingTop:16,marginTop:8}}>
          GHGGibPro™ Platform · National Holding Group · Base Year 2025 fixed reference for all future performance comparison
        </div>
      </div>
    </div>);
};

// ── ROOT ────────────────────────────────────────────────────────
// Firestore doc path used per division: submissions/{entityId}/divisions/{divisionId}
// (a valid 4-segment Firestore document path — collection/doc/collection/doc)
function GHGGibPro(){
  const [page,setPage]=useState("landing");
  const [user,setUser]=useState(null);
  const [store,setStoreLocal]=useState({}); // {entId/divId: {rows,tiers,fte,prod,status,note}}
  const [dbStatus,setDbStatus]=useState("connecting"); // connecting | live | offline

  // Real-time read: listen across every division doc, for every entity, at once.
  useEffect(()=>{
    let unsub=null, cancelled=false;
    const start=()=>{
      if(cancelled) return;
      if(!window.__fb){ setTimeout(start,150); return; }
      const {db,collectionGroup,onSnapshot}=window.__fb;
      try{
        unsub=onSnapshot(collectionGroup(db,"divisions"), snap=>{
          const next={};
          snap.forEach(docSnap=>{
            const entId=docSnap.ref.parent.parent.id;
            const divId=docSnap.id;
            next[dkey(entId,divId)]=docSnap.data();
          });
          setStoreLocal(next);
          setDbStatus("live");
        }, err=>{ console.error("Firestore listen failed:",err); setDbStatus("offline"); });
      }catch(err){ console.error("Firestore init failed:",err); setDbStatus("offline"); }
    };
    start();
    return ()=>{ cancelled=true; if(unsub) unsub(); };
  },[]);

  // Write-through: every setStore(...) call from any screen pushes only the
  // changed division(s) to Firestore. The onSnapshot listener above then
  // reflects the confirmed write back into local state for every open tab.
  const setStore=useCallback(nextStore=>{
    setStoreLocal(prevStore=>{
      if(window.__fb){
        const {db,doc,setDoc}=window.__fb;
        const keys=new Set([...Object.keys(prevStore),...Object.keys(nextStore)]);
        keys.forEach(k=>{
          if(JSON.stringify(prevStore[k])!==JSON.stringify(nextStore[k])){
            const [entId,divId]=k.split("/");
            setDoc(doc(db,"submissions",entId,"divisions",divId),nextStore[k]||{})
              .catch(err=>console.error("Firestore write failed for",k,err));
          }
        });
      }
      return nextStore;
    });
  },[]);

  return(
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      {dbStatus==="offline" && <div style={{background:"#FCE4D6",color:"#C62828",textAlign:"center",padding:"7px 10px",fontSize:11.5,fontWeight:700}}>
        ⚠ Not connected to the live database right now — changes may not be visible to other users. Check your internet connection and refresh.</div>}
      {page==="landing"&&<Landing go={setPage}/>}
      {page==="publicExec"&&<PublicExec go={setPage}/>}
      {page==="login"&&<Login go={setPage} setUser={setUser}/>}
      {page==="divEntry"&&user?.role==="div"&&<DivEntry user={user} go={setPage} store={store} setStore={setStore}/>}
      {page==="entConsole"&&user?.role==="ent"&&<EntConsole user={user} go={setPage} store={store} setStore={setStore}/>}
      {page==="admin"&&<AdminDash go={setPage} store={store} setStore={setStore}/>}
      {page==="exec"&&<ExecSummary go={setPage} store={store}/>}
    </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<GHGGibPro/>);

</script>
</body>
</html>
